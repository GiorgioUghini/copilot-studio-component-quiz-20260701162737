<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <meta name="description" content="{{ page.description }}">
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.description }}">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Copilot Studio Component Quiz">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <script>
    (() => {
      const param = new URLSearchParams(window.location.search).get("clawpilotTheme");
      const theme =
        param || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <script>
    (() => {
      if (!new URLSearchParams(window.location.search).has("clawpilotTheme")) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>
  <style>
:root {
  color-scheme: light;
  --cp-bg: #f7f4ef;
  --cp-bg-elevated: #fcfbf8;
  --cp-surface: #ffffff;
  --cp-surface-soft: #f5f5f5;
  --cp-border: #dedede;
  --cp-border-strong: #919191;
  --cp-text: #242424;
  --cp-text-muted: #5c5c5c;
  --cp-text-soft: #6f6f6f;
  --cp-accent: #b11f4b;
  --cp-accent-hover: #9a1a41;
  --cp-accent-soft: rgba(177, 31, 75, 0.08);
  --cp-accent-fg: #ffffff;
  --cp-success: #16a34a;
  --cp-danger: #dc2626;
  --cp-warning: #f59e0b;
  --cp-link: #0078d4;
  --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.12);
  --cp-overlay: rgba(255, 255, 255, 0.8);
  --cp-panel: rgba(255, 255, 255, 0.86);
  --cp-panel-strong: rgba(255, 255, 255, 0.96);
  --cp-sheen: rgba(255, 255, 255, 0.55);
  --cp-highlight: rgba(177, 31, 75, 0.12);
}
html[data-theme="dark"] {
  color-scheme: dark;
  --cp-bg: #3d3b3a;
  --cp-bg-elevated: #343231;
  --cp-surface: #292929;
  --cp-surface-soft: #2e2e2e;
  --cp-border: #474747;
  --cp-border-strong: #5f5f5f;
  --cp-text: #dedede;
  --cp-text-muted: #919191;
  --cp-text-soft: #b0b0b0;
  --cp-accent: #fd8ea1;
  --cp-accent-hover: #fb7b91;
  --cp-accent-soft: rgba(253, 142, 161, 0.14);
  --cp-accent-fg: #1a1a1a;
  --cp-success: #4ade80;
  --cp-danger: #f87171;
  --cp-warning: #fbbf24;
  --cp-link: #4da6ff;
  --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
  --cp-overlay: rgba(41, 41, 41, 0.88);
  --cp-panel: rgba(41, 41, 41, 0.72);
  --cp-panel-strong: rgba(41, 41, 41, 0.96);
  --cp-sheen: rgba(255, 255, 255, 0.04);
  --cp-highlight: rgba(253, 142, 161, 0.12);
}
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: clamp(1rem, 4vw, 2rem);
  background:
    radial-gradient(circle at 72% 42%, color-mix(in srgb, var(--cp-link) 11%, transparent), transparent 34rem),
    radial-gradient(circle at 90% 78%, color-mix(in srgb, var(--cp-success) 10%, transparent), transparent 26rem),
    linear-gradient(105deg, color-mix(in srgb, var(--cp-link) 4%, var(--cp-surface)) 0 34%, var(--cp-surface) 34% 100%);
  color: var(--cp-text);
  font-family: "Segoe UI", Aptos, Calibri, -apple-system, BlinkMacSystemFont, sans-serif;
}
.card {
  width: min(100%, 42rem);
  padding: clamp(1.25rem, 5vw, 2.5rem);
  border: 1px solid color-mix(in srgb, var(--cp-surface) 72%, var(--cp-border));
  border-radius: 16px;
  background:
    radial-gradient(circle at top, color-mix(in srgb, var(--cp-link) 8%, transparent), transparent 18rem),
    var(--cp-surface);
  box-shadow: 0 0 2px color-mix(in srgb, var(--cp-text) 12%, transparent), 0 1px 2px color-mix(in srgb, var(--cp-text) 14%, transparent), 0 2rem 5rem color-mix(in srgb, var(--cp-text) 10%, transparent);
  text-align: center;
  backdrop-filter: blur(1.5rem);
}
.eyebrow {
  margin: 0 0 0.75rem;
  color: var(--cp-text-muted);
  font-weight: 700;
}
.icon {
  width: 4rem;
  height: 4rem;
  display: grid;
  place-items: center;
  margin: 0 auto 1rem;
  border: 1px solid color-mix(in srgb, var(--cp-link) 28%, var(--cp-border));
  border-radius: 16px;
  background: linear-gradient(135deg, color-mix(in srgb, var(--cp-link) 12%, var(--cp-surface)), color-mix(in srgb, var(--cp-success) 10%, var(--cp-surface)));
  color: var(--cp-link);
  font-size: 2rem;
}
h1 {
  margin: 0;
  color: var(--cp-link);
  font-size: clamp(2rem, 8vw, 4rem);
  line-height: 0.95;
  letter-spacing: -0.06em;
}
.description {
  margin: 1rem auto 0;
  max-width: 32rem;
  color: var(--cp-text-muted);
  font-size: 1.1rem;
  line-height: 1.55;
}
.badge {
  display: inline-flex;
  margin-top: 1rem;
  padding: 0.5rem 0.75rem;
  border: 1px solid color-mix(in srgb, var(--cp-link) 32%, var(--cp-border));
  border-radius: 999px;
  background: color-mix(in srgb, var(--cp-link) 8%, var(--cp-surface));
  color: var(--cp-link);
  font-weight: 900;
}
.button {
  display: inline-flex;
  margin-top: 1.25rem;
  padding: 0.875rem 1rem;
  border: 1px solid color-mix(in srgb, var(--cp-link) 72%, var(--cp-border));
  border-radius: 999px;
  background: var(--cp-link);
  color: var(--cp-accent-fg);
  text-decoration: none;
  font-weight: 800;
  box-shadow: 0 0 2px color-mix(in srgb, var(--cp-text) 12%, transparent), 0 1rem 2rem color-mix(in srgb, var(--cp-link) 14%, transparent);
}
.disclaimer {
  margin: 1rem 0 0;
  color: var(--cp-text-soft);
  font-size: 0.78rem;
}
  </style>
</head>
<body>
  <main class="card">
    <div class="icon" aria-hidden="true">{{ page.icon }}</div>
    <p class="eyebrow">I took the Copilot Studio Component Quiz and I am...</p>
    <h1>{{ page.component }}</h1>
    <p class="description">{{ page.description }}</p>
    <div class="badge">{{ page.badge }}</div>
    <br>
    <a class="button" href="{{ '/' | relative_url }}">Take the test yourself</a>
    <p class="disclaimer">Just a joke. Not affiliated with Microsoft.</p>
  </main>
</body>
</html>
